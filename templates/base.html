<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Project C20{% endblock %}</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Design System Assets -->
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="/assets/css/components.css">
    <link rel="stylesheet" href="/assets/css/main.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    {% block extra_head %}{% endblock %}
</head>
<body class="h-full">
    <div id="app" class="h-full flex overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar flex flex-col">
            <div class="sidebar__logo">
                NEXUS<span class="text-accent">.</span>
            </div>
            
            <nav class="nav flex-grow">
                <a href="/" class="nav__item nav__item--active">
                    <i class="fa-solid fa-house nav__icon"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav__item">
                    <i class="fa-solid fa-briefcase nav__icon"></i>
                    <span>Projects</span>
                </a>
                <a href="#" class="nav__item">
                    <i class="fa-solid fa-chart-line nav__icon"></i>
                    <span>Analytics</span>
                </a>
                <a href="#" class="nav__item">
                    <i class="fa-solid fa-users nav__icon"></i>
                    <span>Team</span>
                </a>
                <a href="#" class="nav__item">
                    <i class="fa-solid fa-gear nav__icon"></i>
                    <span>Settings</span>
                </a>
            </nav>

            <div class="sidebar__footer">
                <a href="#" class="nav__item mt-2">
                    <i class="fa-solid fa-circle-question nav__icon"></i>
                    <span>Help Center</span>
                </a>
            </div>
        </aside>

        <!-- Main Wrapper -->
        <div class="flex-grow flex flex-col overflow-hidden">
            <!-- Topbar -->
            <header class="topbar">
                <button id="sidebarToggle" class="hamburger">
                    <i class="fa-solid fa-bars hamburger__icon"></i>
                </button>
                <div class="topbar__search">Search anything...</div>
                
                <div class="topbar__actions flex items-center gap-4">
                    <div class="user-profile">
                        <div class="user-profile__avatar"></div>
                        <span class="text-sm font-medium">David T.</span>
                    </div>
                </div>
            </header>

            <!-- Content Area -->
            <main class="main-content flex-grow overflow-auto">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/assets/js/global.js"></script>
    <script src="/assets/js/utils.js"></script>
    <script src="/assets/js/app.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
