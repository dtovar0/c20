<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nexus | Premium Dashboard{% endblock %}</title>
    
    <!-- Meta SEO -->
    <meta name="description" content="Dashboard de alta densidad con diseño basado en tokens y arquitectura modular.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--color-primary); border-radius: 10px; opacity: 0.1; }
    </style>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: 'var(--color-primary)',
                        bg: 'var(--color-bg)',
                        text: 'var(--color-text)',
                        accent: 'var(--color-accent)',
                        secondary: 'var(--color-secondary)',
                    },
                    borderRadius: {
                        'base': 'var(--radius-base)',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bg text-text h-full overflow-hidden transition-colors duration-300">
    <div class="flex h-full overflow-hidden">
        <!-- Sidebar -->
        {% include 'components/sidebar.html' %}

        <!-- Main Wrapper -->
        <div id="mainContent" class="flex-grow flex flex-col h-full min-w-0 transition-all duration-300 bg-gray-50/50 dark:bg-slate-950/50">
            <!-- Topbar -->
            {% include 'components/topbar.html' %}
            
            <!-- Main Content -->
            <main class="flex-grow overflow-y-auto custom-scrollbar p-6">
                <div class="max-w-7xl mx-auto">
                    {% block content %}{% endblock %}
                </div>
            </main>
        </div>
    </div>

    <!-- Scripts Globales -->
    <script>
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        const sidebarToggle = document.getElementById('sidebarToggle');
        
        // Función para cambiar estado del Sidebar
        function toggleSidebar() {
            const isMobile = window.innerWidth < 1024;
            
            if (isMobile) {
                sidebar.classList.toggle('-translate-x-full');
            } else {
                sidebar.classList.toggle('w-64');
                sidebar.classList.toggle('w-20');
                
                // Toggle classes for content that should hide when collapsed
                document.querySelectorAll('.sidebar-text').forEach(el => {
                    el.classList.toggle('hidden');
                });
                
                // Adjust logo visibility if needed
                const brandText = document.querySelector('.brand-text');
                if (brandText) brandText.classList.toggle('hidden');
            }
        }

        if (sidebarToggle) {
            sidebarToggle.addEventListener('click', toggleSidebar);
        }

        // Auto Dark Mode Check (Opcional)
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
