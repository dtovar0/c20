<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nexus | Premium Dashboard{% endblock %}</title>
    
    <!-- Meta SEO -->
    <meta name="description" content="Dashboard de alta densidad con diseño basado en tokens y arquitectura modular.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}?v={{ range(1000, 9999) | random }}">
    <link rel="stylesheet" href="{{ url_for('serve_assets', filename='css/global.css') }}?v={{ range(1000, 9999) | random }}">
    <link rel="stylesheet" href="{{ url_for('serve_assets', filename='css/main.css') }}?v={{ range(1000, 9999) | random }}">
    <link rel="stylesheet" href="{{ url_for('serve_assets', filename='css/components.css') }}?v={{ range(1000, 9999) | random }}">
    
    <script src="{{ url_for('serve_assets', filename='js/global.js') }}"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: 'rgb(var(--color-primary) / <alpha-value>)',
                        bg: 'var(--color-body-bg)',
                        text: 'var(--color-body-text)',
                        header: 'var(--color-header-bg)',
                        'header-text': 'var(--color-header-text)',
                        accent: 'rgb(var(--color-accent) / <alpha-value>)',
                        secondary: 'rgb(var(--color-secondary) / <alpha-value>)',
                        'accent-a': 'rgb(var(--color-accent-a) / <alpha-value>)',
                        'accent-b': 'rgb(var(--color-accent-b) / <alpha-value>)',
                        'accent-c': 'rgb(var(--color-accent-c) / <alpha-value>)',
                        'panel-fill': 'rgb(var(--color-panel-fill))',
                        'panel-border': 'rgb(var(--color-panel-border))',
                        'audit-body': 'rgb(var(--color-audit-body))',
                        'button-bg': 'rgb(var(--color-button-bg) / <alpha-value>)',
                        'button-text': 'rgb(var(--color-button-text) / <alpha-value>)',
                        'button-disabled': 'rgb(var(--color-button-disabled-bg) / <alpha-value>)',
                        'button-disabled-text': 'rgb(var(--color-button-disabled-text) / <alpha-value>)',
                        'input': 'rgb(var(--color-input-bg))',
                        'input-text': 'var(--color-input-text)',
                        'input-border': 'rgb(var(--color-input-border))',
                        'input-focus': 'rgb(var(--color-input-focus))',
                        'label': 'rgb(var(--color-label-text) / <alpha-value>)',
                        'tab-active': 'rgb(var(--color-tab-active-bg) / <alpha-value>)',
                        'tab-active-text': 'rgb(var(--color-tab-active-text) / <alpha-value>)',
                        'tab-inactive': 'rgb(var(--color-tab-inactive-bg))',
                        'tab-inactive-text': 'rgb(var(--color-tab-inactive-text) / <alpha-value>)',
                        'surface-container': 'rgb(var(--color-surface-container-bg) / <alpha-value>)',
                        'surface-container-border': 'rgb(var(--color-surface-container-border) / <alpha-value>)',
                        'icon-picker-hover': 'rgb(var(--color-icon-picker-hover) / <alpha-value>)',
                    },
                    borderRadius: {
                        'base': 'var(--radius-base)',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bg text-text h-full overflow-hidden transition-colors duration-300">
    <div class="flex h-full overflow-hidden">
        <!-- Sidebar -->
        {% include 'components/sidebar.html' %}

        <!-- Main Wrapper -->
        <div id="mainContent" class="flex-grow flex flex-col h-full min-w-0 transition-all duration-300 bg-gray-50/50 dark:bg-slate-950/50">
            <!-- Topbar -->
            {% include 'components/topbar.html' %}
            
            <!-- Main Content -->
            <main class="flex-grow overflow-y-auto custom-scrollbar p-6">
                <div class="w-full h-full flex flex-col">
                    {% block content %}{% endblock %}
                </div>
            </main>
        </div>
    </div>

    <!-- Scripts Globales -->
    {% block scripts %}{% endblock %}
</body>
</html>
