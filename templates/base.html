<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nexus | Premium Dashboard{% endblock %}</title>
    
    <!-- Meta SEO -->
    <meta name="description" content="Dashboard de alta densidad con diseño basado en tokens y arquitectura modular.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}?v={{ range(1000, 9999) | random }}">
    <link rel="stylesheet" href="{{ url_for('serve_assets', filename='css/global.css') }}?v={{ range(1000, 9999) | random }}">
    <link rel="stylesheet" href="{{ url_for('serve_assets', filename='css/main.css') }}?v={{ range(1000, 9999) | random }}">
    <link rel="stylesheet" href="{{ url_for('serve_assets', filename='css/components.css') }}?v={{ range(1000, 9999) | random }}">
    
    <script src="{{ url_for('serve_assets', filename='js/global.js') }}"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: 'rgb(var(--color-primary) / <alpha-value>)',
                        bg: 'var(--color-body-bg)',
                        text: 'var(--color-body-text)',
                        header: 'var(--color-header-bg)',
                        'header-text': 'var(--color-header-text)',
                        accent: 'rgb(var(--color-accent) / <alpha-value>)',
                        secondary: 'rgb(var(--color-secondary) / <alpha-value>)',
                        'accent-a': 'rgb(var(--color-accent-a) / <alpha-value>)',
                        'accent-b': 'rgb(var(--color-accent-b) / <alpha-value>)',
                        'accent-c': 'rgb(var(--color-accent-c) / <alpha-value>)',
                        'panel-fill': 'rgb(var(--color-panel-fill))',
                        'panel-border': 'rgb(var(--color-panel-border))',
                        'audit-body': 'rgb(var(--color-audit-body))',
                        'button-bg': 'rgb(var(--color-button-bg) / <alpha-value>)',
                        'button-text': 'rgb(var(--color-button-text) / <alpha-value>)',
                        'button-disabled': 'rgb(var(--color-button-disabled-bg) / <alpha-value>)',
                        'button-disabled-text': 'rgb(var(--color-button-disabled-text) / <alpha-value>)',
                        'input': 'rgb(var(--color-input-bg))',
                        'input-text': 'var(--color-input-text)',
                        'input-border': 'rgb(var(--color-input-border))',
                        'input-focus': 'rgb(var(--color-input-focus))',
                        'label': 'rgb(var(--color-label-text) / <alpha-value>)',
                        'tab-active': 'rgb(var(--color-tab-active-bg) / <alpha-value>)',
                        'tab-active-text': 'rgb(var(--color-tab-active-text) / <alpha-value>)',
                        'tab-inactive': 'rgb(var(--color-tab-inactive-bg))',
                        'tab-inactive-text': 'rgb(var(--color-tab-inactive-text) / <alpha-value>)',
                        'surface-container': 'rgb(var(--color-surface-container-bg) / <alpha-value>)',
                        'surface-container-border': 'rgb(var(--color-surface-container-border) / <alpha-value>)',
                        'icon-picker-hover': 'rgb(var(--color-icon-picker-hover) / <alpha-value>)',
                    },
                    borderRadius: {
                        'base': 'var(--radius-base)',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bg text-text h-full overflow-hidden transition-colors duration-300">
    <div class="flex h-full overflow-hidden">
        <!-- Sidebar -->
        {% include 'components/sidebar.html' %}

        <!-- Main Wrapper -->
        <div id="mainContent" class="flex-grow flex flex-col h-full min-w-0 transition-all duration-300 bg-transparent">
            <!-- Topbar -->
            <header class="h-16 border-b border-panel-border bg-panel-fill/80 backdrop-blur-md sticky top-0 z-30 flex items-center justify-between px-6 transition-colors">
                <div class="flex items-center gap-4">
                    <!-- Hamburger Button -->
                    <button id="sidebarToggle" class="p-2 hover:bg-surface-container rounded-base transition-colors group">
                        <svg class="w-6 h-6 text-secondary group-hover:text-primary transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                    <!-- Location / Breadcrumbs -->
                    <nav class="flex items-center gap-2 ml-4 brand-text transition-all duration-300 text-sm font-medium">
                        {% block breadcrumbs %}
                        <span class="text-secondary">Nexus</span>
                        <svg class="w-4 h-4 text-label/60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        <span class="text-primary">Dashboard</span>
                        {% endblock %}
                    </nav>
                </div>

                <div class="flex items-center gap-4">
                    <!-- Search -->
                    <div class="hidden sm:flex items-center bg-input px-3 py-1.5 rounded-base gap-2 border border-input-border focus-within:border-input-focus transition-all">
                        <svg class="w-4 h-4 text-secondary group-focus-within:text-primary transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <input type="text" placeholder="Buscar..." class="bg-transparent border-none focus:ring-0 text-input text-sm w-48 outline-none">
                    </div>

                    <!-- Notifications -->
                    <button class="relative p-2 hover:bg-surface-container rounded-base transition-all group active:scale-95">
                        <svg class="w-5 h-5 text-secondary group-hover:text-primary transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                        </svg>
                        <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-rose-500 rounded-full border-2 border-white dark:border-slate-900 group-hover:scale-110 transition-transform"></span>
                    </button>

                    <!-- Theme Toggle -->
                    <button id="themeToggle" class="p-2 hover:bg-surface-container rounded-base transition-all group flex items-center justify-center relative overflow-hidden active:scale-95">
                        <svg class="w-5 h-5 text-secondary dark:hidden group-hover:text-primary transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.364l-.707-.707M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        <svg class="w-5 h-5 text-label/60 hidden dark:block group-hover:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    </button>
                </div>
            </header>
            
            <!-- Main Content -->
            <main class="flex-grow overflow-y-auto custom-scrollbar p-6">
                <div class="w-full h-full flex flex-col">
                    {% block content %}{% endblock %}
                </div>
            </main>
        </div>
    </div>

    <!-- Scripts Globales -->
    {% block scripts %}{% endblock %}
</body>
</html>
