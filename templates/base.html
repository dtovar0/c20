<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nexus | Premium Dashboard{% endblock %}</title>
    
    <!-- Meta SEO -->
    <meta name="description" content="Dashboard de alta densidad con diseño basado en tokens y arquitectura modular.">
    <meta name="color-scheme" content="light dark">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <script src="{{ url_for('serve_assets', filename='js/global.js') }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

    <!-- Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="{{ url_for('serve_assets', filename='js/tailwind-config.js') }}"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}?v={{ range(1000, 9999) | random }}">
    <link rel="stylesheet" href="{{ url_for('serve_assets', filename='css/global.css') }}?v={{ range(1000, 9999) | random }}">
    <link rel="stylesheet" href="{{ url_for('serve_assets', filename='css/main.css') }}?v={{ range(1000, 9999) | random }}">
    <link rel="stylesheet" href="{{ url_for('serve_assets', filename='css/components.css') }}?v={{ range(1000, 9999) | random }}">
    
    <!-- jQuery & DataTables -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/2.0.5/css/dataTables.dataTables.min.css">
    <script src="https://cdn.datatables.net/2.0.5/js/dataTables.min.js"></script>

    <body class="bg-bg text-text h-full overflow-hidden" 
          data-brand-bg="{{ sys_config.bg_color if sys_config else '' }}" 
          data-brand-text="{{ sys_config.text_color if sys_config else '' }}">
    <div class="flex h-full overflow-hidden">
        <!-- Sidebar -->
        {% include 'components/sidebar.html' %}

        <!-- Main Wrapper -->
        <div id="mainContent" class="flex-grow flex flex-col h-full min-w-0 bg-bg">
            <!-- Topbar -->
            <header class="h-16 border-b border-panel-border bg-panel-fill/80 backdrop-blur-md sticky top-0 z-30 flex items-center justify-between px-6 transition-colors">
                <div class="flex items-center gap-4">
                    <!-- Hamburger Button -->
                    <button id="sidebarToggle" class="p-2 hover:bg-surface-container rounded-base transition-colors group">
                        <svg class="w-6 h-6 text-secondary group-hover:text-primary transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                    <!-- Location / Breadcrumbs -->
                    <nav class="flex items-center gap-2 ml-4 brand-text transition-all duration-300 text-sm font-medium">
                        {% block breadcrumbs %}
                        <span class="text-secondary">Nexus</span>
                        <svg class="w-4 h-4 text-label/60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        <span class="text-primary">Dashboard</span>
                        {% endblock %}
                    </nav>
                </div>

                <div class="flex items-center gap-4">
                    <!-- Search -->
                    <div class="hidden sm:flex items-center bg-input-bg px-5 py-3 rounded-2xl gap-3 border border-panel-border focus-within:border-input-focus transition-all shadow-sm group">
                        <svg class="w-4 h-4 text-label/60 group-focus-within:text-primary transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <input type="text" placeholder="Buscar en el sistema..." class="bg-transparent border-none focus:ring-0 text-input text-sm font-bold w-64 outline-none placeholder:text-label/60">
                    </div>

                    <!-- Notifications -->
                    <div class="relative items-center flex">
                        <button id="notificationBtn" class="relative p-2 hover:bg-surface-container rounded-base transition-all group active:scale-95">
                            <svg class="w-5 h-5 text-secondary group-hover:text-primary transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                            </svg>
                            <span id="notificationBadge" class="hidden absolute -top-1 -right-1 min-w-[18px] h-[18px] px-1 bg-gradient-to-br from-rose-500 to-pink-600 rounded-full border-2 border-bg shadow-[0_0_10px_rgba(244,63,94,0.4)] flex items-center justify-center text-[9px] font-black text-white transition-all duration-300 group-hover:scale-110 active:scale-90 z-10">0</span>
                        </button>

                        <!-- Notification Dropdown -->
                        <div id="notificationDropdown" class="absolute right-0 top-full mt-2 w-80 bg-panel-fill/95 backdrop-blur-xl border border-panel-border rounded-2xl shadow-2xl opacity-0 translate-y-4 pointer-events-none transition-all duration-300 z-50 overflow-hidden">
                            <div class="p-4 border-b border-panel-border flex justify-between items-center bg-surface-container/30">
                                <h3 class="text-[10px] font-black text-label uppercase tracking-widest text-primary/80">Notificaciones</h3>
                                <div class="flex items-center gap-3">
                                    <button onclick="markAllAsRead()" class="text-[9px] font-black text-primary hover:underline uppercase tracking-tighter">Marcar todo</button>
                                    <div class="w-1 h-1 rounded-full bg-panel-border"></div>
                                    <button onclick="deleteAllNotifications()" class="text-[9px] font-black text-rose-500/60 hover:text-rose-500 hover:underline uppercase tracking-tighter">Borrar todo</button>
                                </div>
                            </div>
                            <!-- Filter Pills -->
                            <div class="px-4 py-2 bg-surface-container/10 border-b border-panel-border flex gap-2 overflow-x-auto custom-scrollbar no-scrollbar">
                                <button data-filter="all" class="notif-filter active px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-tighter transition-all">Todos</button>
                                <button data-filter="warning" class="notif-filter px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-tighter transition-all opacity-40 hover:opacity-100">Seguridad</button>
                                <button data-filter="info" class="notif-filter px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-tighter transition-all opacity-40 hover:opacity-100">Sistema</button>
                                <button data-filter="success" class="notif-filter px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-tighter transition-all opacity-40 hover:opacity-100">Éxito</button>
                            </div>
                            <div id="notificationList" class="max-h-[320px] overflow-y-auto custom-scrollbar">
                                <div class="p-8 text-center opacity-40">
                                    <svg class="w-8 h-8 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                                    <p class="text-[10px] font-black uppercase tracking-widest">Sin notificaciones</p>
                                </div>
                            </div>
                            <a href="{{ url_for('audit.index') }}" class="p-3 bg-surface-container/30 border-t border-panel-border text-center block text-[10px] font-black text-label uppercase tracking-widest hover:text-primary transition-colors">Ver historial completo</a>
                        </div>
                    </div>

                    <!-- Theme Toggle -->
                    <button id="themeToggle" class="p-2 hover:bg-surface-container rounded-base transition-all group flex items-center justify-center relative overflow-hidden active:scale-95">
                        <svg class="w-5 h-5 text-secondary dark:hidden group-hover:text-primary transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.364l-.707-.707M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        <svg class="w-5 h-5 text-label/60 hidden dark:block group-hover:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    </button>
                </div>
            </header>
            
            <!-- Main Content -->
            <main class="flex-grow overflow-y-auto custom-scrollbar pt-4 px-6 pb-6">
                <div class="w-full h-full flex flex-col">
                    {% block content %}{% endblock %}
                </div>
            </main>
        </div>
    </div>

    <!-- Scripts Globales -->
    {% block scripts %}{% endblock %}
</body>
</html>
