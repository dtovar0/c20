<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nexus | Premium Dashboard{% endblock %}</title>
    
    <!-- Meta SEO -->
    <meta name="description" content="Dashboard de alta densidad con diseño basado en tokens y arquitectura modular.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}">
    <link rel="stylesheet" href="{{ url_for('serve_assets', filename='css/global.css') }}?v=1.1">
    <link rel="stylesheet" href="{{ url_for('serve_assets', filename='css/main.css') }}?v=1.1">
    
    <script src="{{ url_for('serve_assets', filename='js/global.js') }}"></script>
</head>
<body class="bg-bg text-text h-full overflow-hidden transition-colors duration-300">
    <div class="flex h-full overflow-hidden">
        <!-- Sidebar -->
        {% include 'components/sidebar.html' %}

        <!-- Main Wrapper -->
        <div id="mainContent" class="flex-grow flex flex-col h-full min-w-0 transition-all duration-300 bg-gray-50/50 dark:bg-slate-950/50">
            <!-- Topbar -->
            {% include 'components/topbar.html' %}
            
            <!-- Main Content -->
            <main class="flex-grow overflow-y-auto custom-scrollbar p-6">
                <div class="w-full h-full flex flex-col">
                    {% block content %}{% endblock %}
                </div>
            </main>
        </div>
    </div>

    <!-- Scripts Globales -->
    {% block scripts %}{% endblock %}
</body>
</html>
