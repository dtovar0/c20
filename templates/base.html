<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Premium App{% endblock %}</title>
    
    <!-- Meta SEO -->
    <meta name="description" content="Una aplicación de arquitectura modular construida con los más altos estándares.">
    
    <!-- Styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}">
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="/assets/css/main.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: 'var(--color-primary)',
                        bg: 'var(--color-bg)',
                        text: 'var(--color-text)',
                    },
                    borderRadius: {
                        'base': 'var(--radius-base)',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bg text-text h-full transition-colors duration-300">
    <div class="min-h-screen flex flex-col">
        {% include 'components/navbar.html' ignore missing %}
        
        <main class="flex-grow container mx-auto px-4 py-8">
            {% block content %}{% endblock %}
        </main>
        
        {% include 'components/footer.html' ignore missing %}
    </div>

    <!-- Scripts -->
    <script src="/assets/js/global.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
