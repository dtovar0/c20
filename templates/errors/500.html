<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Error 500</title>
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/static/css/tokens.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Inter', sans-serif; overflow: hidden; }
        .cyber-grid { position: fixed; inset: 0; background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0); background-size: 40px 40px; pointer-events: none; }
        .glitch-text { animation: glitch 2s infinite; position: relative; }
        @keyframes glitch {
            0% { transform: translate(0); text-shadow: none; }
            20% { transform: translate(-2px, 2px); text-shadow: 2px 0 #f43f5e, -2px 0 #2563eb; }
            40% { transform: translate(-2px, -2px); text-shadow: 2px 0 #f43f5e, -2px 0 #2563eb; }
            60% { transform: translate(2px, 2px); text-shadow: 2px 0 #f43f5e, -2px 0 #2563eb; }
            80% { transform: translate(2px, -2px); text-shadow: 2px 0 #f43f5e, -2px 0 #2563eb; }
            100% { transform: translate(0); text-shadow: none; }
        }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    <div class="relative z-10 text-center px-6">
        <div class="mb-8 flex justify-center">
            <div class="w-24 h-24 rounded-3xl bg-rose-500/10 border border-rose-500/30 flex items-center justify-center shadow-[0_0_50px_rgba(244,63,94,0.1)]">
                <svg class="w-12 h-12 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            </div>
        </div>
        <h1 class="text-6xl md:text-8xl font-black tracking-tighter mb-4 glitch-text">500</h1>
        <h2 class="text-xl md:text-2xl font-bold uppercase tracking-[0.3em] text-white/90 mb-6">Internal Server Error</h2>
        <p class="text-label/60 max-w-md mx-auto mb-10 leading-relaxed">Nuestros sistemas han detectado una anomalía crítica en el núcleo del servidor. El equipo técnico ha sido notificado automáticamente.</p>
        <div class="flex flex-col md:flex-row items-center justify-center gap-4">
            <a href="/" class="px-8 py-4 bg-white/5 hover:bg-white/10 border border-white/10 rounded-2xl text-[12px] font-black uppercase tracking-widest text-white transition-all">Regresar al Inicio</a>
            <button onclick="window.location.reload()" class="px-8 py-4 bg-rose-500/10 hover:bg-rose-500/20 border border-rose-500/30 rounded-2xl text-[12px] font-black uppercase tracking-widest text-rose-400 transition-all">Intentar de nuevo</button>
        </div>
    </div>
</body>
</html>
