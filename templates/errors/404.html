<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Página no encontrada</title>
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/static/css/tokens.css">
    <script src="/assets/js/global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: 'rgb(var(--color-primary))',
                        brand: 'rgb(var(--color-brand))',
                        label: 'rgb(var(--color-label-text))',
                        'panel-fill': 'rgb(var(--color-panel-fill))',
                        'panel-border': 'rgb(var(--color-panel-border))',
                        'input-bg': 'rgb(var(--color-input-bg))',
                        'surface-container': 'rgb(var(--color-surface-container-bg))',
                        'body-bg': 'var(--color-body-bg)',
                        'body-text': 'var(--color-body-text)',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: var(--color-body-bg); color: var(--color-body-text); display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Inter', sans-serif; overflow: hidden; }
        .cyber-grid { position: fixed; inset: 0; background-image: radial-gradient(circle at 2px 2px, rgb(var(--color-primary) / 0.05) 1px, transparent 0); background-size: 40px 40px; pointer-events: none; }
        .hover-glow { transition: all 0.5s ease; cursor: pointer; color: rgb(var(--color-primary)); }
        .hover-glow:hover { text-shadow: 0 0 20px rgb(var(--color-primary) / 0.8); transform: translateY(-5px); }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    <div class="relative z-10 text-center px-6">
        <div class="mb-8 flex justify-center">
            <div class="w-24 h-24 rounded-3xl bg-sky-500/10 border border-sky-500/30 flex items-center justify-center shadow-[0_0_50px_rgba(14,165,233,0.1)] animate-pulse">
                <svg class="w-12 h-12 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
        </div>
        <h1 class="text-6xl md:text-8xl font-black tracking-tighter mb-4 hover-glow">404</h1>
        <h2 class="text-xl md:text-2xl font-bold uppercase tracking-[0.3em] text-body-text/90 mb-6 font-mono">Object Not Found</h2>
        <p class="text-label/60 max-w-md mx-auto mb-10 leading-relaxed">El recurso solicitado no ha podido ser localizado en la arquitectura de datos activa. Verifique la dirección o contacte con un administrador.</p>
        <div class="flex flex-col md:flex-row items-center justify-center gap-4">
            <a href="/" class="px-8 py-4 bg-primary/10 hover:bg-primary/20 border border-primary/40 rounded-2xl text-[12px] font-black uppercase tracking-widest text-primary transition-all shadow-lg shadow-primary/20">Volver al Portal</a>
        </div>
    </div>
</body>
</html>
