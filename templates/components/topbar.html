<header class="h-16 border-b border-gray-200 dark:border-gray-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md sticky top-0 z-30 flex items-center justify-between px-6 transition-colors">
    <div class="flex items-center gap-4">
        <!-- Hamburger Button -->
        <button id="sidebarToggle" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-base transition-colors group">
            <svg class="w-6 h-6 text-secondary group-hover:text-primary transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
        </button>
        <h2 class="text-lg font-semibold tracking-tight text-primary brand-text transition-all duration-300">Nexus Dashboard</h2>
    </div>

    <div class="flex items-center gap-4">
        <!-- Search -->
        <div class="hidden sm:flex items-center bg-gray-100 dark:bg-gray-800 px-3 py-1.5 rounded-base gap-2 border border-transparent focus-within:border-primary transition-all">
            <svg class="w-4 h-4 text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <input type="text" placeholder="Buscar..." class="bg-transparent border-none focus:ring-0 text-sm w-48 outline-none">
        </div>

        <!-- User Profile -->
        <div class="flex items-center gap-3 pl-4 border-l border-gray-200 dark:border-gray-800">
            <div class="text-right hidden sm:block">
                <p class="text-sm font-medium leading-none">Admin User</p>
                <p class="text-xs text-secondary mt-1">Super Admin</p>
            </div>
            <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center border-2 border-primary/20">
                <span class="text-primary font-bold">AD</span>
            </div>
        </div>
    </div>
</header>
