###############################################################
#             AUTHELIA CONFIGURATION FOR NEXUS                #
###############################################################

host: 0.0.0.0
port: 9091

# Cambia esto por tu dominio real
server:
  host: auth.example.com
  port: 9091

log:
  level: info

jwt_secret: "CAMBIA_ESTO_POR_UNA_CLAVE_LARGA_Y_SEGURA"

default_redirection_url: https://nexus.example.com

authentication_backend:
  # Opción 1: Archivo local (Para pruebas rápidas)
  file:
    path: /config/users_database.yml
  
  # Opción 2: LDAP (Descomenta esto para usar tu Directorio Activo)
  # ldap:
  #   url: ldap://10.133.39.5:389
  #   base_dn: dc=example,dc=com
  #   additional_users_dn: ou=users
  #   users_filter: (&({username_attribute}={input})(objectClass=person))
  #   user: cn=admin,dc=example,dc=com
  #   password: CAMBIA_ESTO

password_policy:
  standard:
    enabled: true
    min_length: 8

session:
  name: authelia_session
  domain: example.com # Cambia por tu dominio raíz
  same_site: lax
  secret: "OTRA_CLAVE_SEGURA_PARA_SESIONES"
  expiration: 1h
  inactivity: 5m
  remember_me_duration: 1M
  redis:
    host: authelia-redis
    port: 6379

storage:
  encryption_key: "CLAVE_PARA_ENCRIPTAR_DB_LOCAL"
  local:
    path: /config/db.sqlite3

notifier:
  disable_startup_check: true
  filesystem:
    filename: /config/notification.txt

# Reglas de Acceso
access_control:
  default_policy: deny
  rules:
    - domain: nexus.example.com
      policy: one_factor # Cambia a two_factor para máxima seguridad
